output:
  theme: "default"
  base_url: "https://yourusername.github.io/your-repo"
  content_dir: "sketch"
  # custom_css_path: "~/my-style.css"
  # template_override: "~/my-template.html"

github:
  repo_path: "~/Projects/your-github-pages-repo"
  auto_push: true
  commit_prefix: "📦"

patterns:
  exclude:
    - "draft"
    - "wip"
    - "_private"

validation:
  verify_reachable: true
  max_redirects: 3
